[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/geraet"
  to = "/.netlify/functions/geraet"
  status = 200

[[redirects]]
  from = "/api/filterwechsel"
  to = "/.netlify/functions/filterwechsel"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
